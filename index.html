<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADO Technology Solutions | Next-Gen GRC & Cybersecurity Architecture</title>

    <style>
        :root {
            --bg-pure: #000000;
            --bg-dark: #05070a;
            --bg-card: #0b0f17;
            --glow-blue: #0072ff;
            --glow-cyan: #00c6ff;
            --text-main: #e2e8f0;
            --text-muted: #8a99ad;
            --accent-silver: #f8fafc;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-pure);
            color: var(--text-main);
            font-family: var(--font-family);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- Hero Section --- */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 120px 20px 60px;
            text-align: center;
            position: relative;
        }

        .hero-centerpiece {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 6s ease-in-out infinite;

            /* 🔒 CLIPPING FIX */
            border-radius: 50%;
            overflow: hidden;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .hero-logo-underlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,114,255,0.15) 0%, transparent 70%);
            filter: blur(20px);
            z-index: 1;
        }

        .hero-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.7));
        }

        .hero-ring-accent {
            position: absolute;
            border: 1px solid rgba(0, 198, 255, 0.2);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
            animation: rotateRing 25s linear infinite;
        }

        .ring-1 {
            width: 380px;
            height: 380px;
            border-left-color: transparent;
            border-right-color: transparent;
        }

        .ring-2 {
            width: 440px;
            height: 440px;
            border-top-color: transparent;
            border-bottom-color: transparent;
            animation-duration: 40s;
            animation-direction: reverse;
        }

        @keyframes rotateRing {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            margin-bottom: 15px;
            padding-left: 0.5em;
            color: var(--accent-silver);
        }

        .hero-subtitle {
            font-size: 0.95rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--glow-cyan);
            margin-bottom: 40px;
            padding-left: 0.4em;
        }

        .hero-cta-group {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 14px 32px;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--glow-blue), var(--glow-cyan));
            color: #000;
            font-weight: 700;
        }

        .btn-secondary {
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-main);
        }
    </style>
</head>

<body>

<section class="hero">
    <div class="hero-centerpiece">
        <div class="hero-logo-underlay"></div>
        <img src="SHADO_logo.png" alt="SHADO Logo" class="hero-logo">
    </div>

    <div class="hero-ring-accent ring-1"></div>
    <div class="hero-ring-accent ring-2"></div>

    <h1>SHADO</h1>
    <div class="hero-subtitle">Technology Solutions</div>

    <div class="hero-cta-group">
        <a href="#" class="btn btn-primary">Engage</a>
        <a href="#" class="btn btn-secondary">Explore</a>
    </div>
</section>

</body>
</html>
